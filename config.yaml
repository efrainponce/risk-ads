# Cuenta Google Ads
customer_id: ${GOOGLE_ADS_CUSTOMER_ID}  # placeholder, se resuelve en runtime

# Reglas duras
target_roas: 4.0          # piso de ROAS — regla dura, no negociable
budget_ceiling_mxn: 120000 # ceiling mensual de budget de cuenta

# Cadencia
iteration_days: 14         # quincenal

# Guardrails de auto-apply
budget_change:
  max_increase_pct: 30     # +30% máx por iteración
  max_decrease_pct: 30     # -30% máx por iteración
  learning_phase_days: 14  # no tocar campañas con <14d en strategy actual
  min_floor_mxn: 500       # floor por campaña activa

# Thresholds de significancia (mínimos antes de emitir veredicto)
significance:
  keyword_min_clicks: 100
  keyword_min_impressions: 1000
  ad_min_impressions: 2000
  search_term_min_cost_mxn: 200
  product_min_clicks: 50

# Clasificación
classification:
  lost_is_budget_threshold: 0.05   # 5% — umbral para considerar "subir budget"
  roas_target: 4.0                 # mirror de target_roas para el classifier

# Circuit breakers
circuit_breaker:
  account_roas_floor: 4.0          # si ROAS cuenta < 4.0 → auto-apply OFF
  account_roas_drop_pct: 20        # si cae >20% vs baseline → auto-apply OFF
